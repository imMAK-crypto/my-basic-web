<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6e7b4" />
      <stop offset="100%" stop-color="#c28f2d" />
    </linearGradient>
    <pattern id="silk" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(10)">
      <path d="M0 0L40 0" stroke="#fff" stroke-opacity="0.15" stroke-width="4" />
      <path d="M0 20L40 20" stroke="#fff" stroke-opacity="0.1" stroke-width="2" />
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="#05120f" />
  <rect x="-200" y="-100" width="1600" height="1000" fill="url(#silk)" opacity="0.35" />
  <rect x="180" y="120" width="840" height="560" rx="48" fill="url(#gold)" opacity="0.12" />
  <text x="600" y="420" text-anchor="middle" font-family="Playfair Display, serif" font-size="92" fill="#f4f1e9" letter-spacing="10" font-weight="700">
    TOP MALL
  </text>
  <text x="600" y="500" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="32" fill="#f4f1e9" opacity="0.85">
    SM Street, Calicut
  </text>
  <circle cx="1020" cy="150" r="120" fill="rgba(212,175,55,0.35)" />
  <circle cx="150" cy="700" r="160" fill="rgba(212,175,55,0.18)" />
</svg>
